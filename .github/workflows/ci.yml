name: CI

on:
  push:
    branches: [ main, development ]
  pull_request:

jobs:
  lint:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Clang-Format Style Check
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: 'src'
          extensions: 'c,h'
          clangFormatVersion: 18
          style: file

  build:
    name: Build (${{ matrix.os }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the build can derive the version

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxinerama-dev \
            libjson-c-dev \
            libdbus-1-dev \
            libgtk-4-dev

      - name: Configure CMake (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Codebase (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cmake --build build --config Release

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-json-c
            mingw-w64-x86_64-gtk4

      - name: Install WiX Toolset (Windows)
        if: matrix.os == 'windows-latest'
        run: dotnet tool install --global wix

      - name: Build MSI Installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          DOTNET_PATH="$(cygpath -u "$USERPROFILE")/.dotnet/tools"
          export PATH="$DOTNET_PATH:$PATH"
          
          echo "Accepting WiX v7 EULA..."
          wix eula accept wix7 || true
          
          echo "Adding WiX extensions..."
          wix extension add -g WixToolset.UI.wixext || true
          wix extension add -g WixToolset.Util.wixext || true
          
          echo "Running binary_builder.bat..."
          cmd.exe //c "scripts\\binary_builder.bat" > build_log.txt 2>&1 || true
          
          if ! ls GridFlux-*.msi >/dev/null 2>&1; then
            echo "--- BUILD LOG ---"
            cat build_log.txt
            echo "Build failed! No GridFlux-*.msi was created."
            exit 1
          fi
          echo "Build completed successfully: $(ls GridFlux-*.msi)"

      - name: Test MSI Installation (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $msi = Get-ChildItem -Path $PWD -Filter "GridFlux-*.msi" | Select-Object -First 1
          $logPath = "$PWD\msi_install.log"
          if (-not $msi) {
            Write-Error "No GridFlux-*.msi found! Directory contents:"
            Get-ChildItem
            exit 1
          }
          $msiPath = $msi.FullName
          Write-Host "Found MSI at $msiPath. Installing..."
          $proc = Start-Process -FilePath "msiexec.exe" -ArgumentList "/i", "`"$msiPath`"", "/qn", "/norestart", "/l*v", "`"$logPath`"" -Wait -NoNewWindow -PassThru
          Write-Host "msiexec exited with code $($proc.ExitCode)"
          if (Test-Path "C:\Program Files\GridFlux\gridflux-launcher.exe") {
            Write-Host "Installation successful! Found in Program Files."
          } elseif (Test-Path "C:\Program Files (x86)\GridFlux\gridflux-launcher.exe") {
            Write-Host "Installation successful! Found in Program Files (x86)."
          } else {
            Write-Host "Installation failed! Outputting log..."
            if (Test-Path $logPath) { Get-Content $logPath }
            exit 1
          }

  test-linux-distros:
    name: Test Install (${{ matrix.distro }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:latest
          - debian:stable-slim
          - fedora:latest
          - archlinux:latest
          - opensuse/tumbleweed:latest
          - alpine:latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Installer on ${{ matrix.distro }}
        run: |
          BOOTSTRAP=""
          if [[ "${{ matrix.distro }}" == *"alpine"* ]]; then
            BOOTSTRAP="apk update && apk add --no-cache bash build-base"
          fi

          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e DISPLAY=:99 \
            -e CI=true \
            -e DEBIAN_FRONTEND=noninteractive \
            -e BOOTSTRAP="$BOOTSTRAP" \
            ${{ matrix.distro }} \
            sh -c '
              eval "$BOOTSTRAP" && \
              mkdir -p /tmp/mock && \
              echo "#!/bin/sh" > /tmp/mock/sudo && \
              echo "exec \"\$@\"" >> /tmp/mock/sudo && \
              echo "#!/bin/sh" > /tmp/mock/systemctl && \
              echo "exit 0" >> /tmp/mock/systemctl && \
              chmod +x /tmp/mock/sudo /tmp/mock/systemctl && \
              export PATH="/tmp/mock:$PATH" && \
              ./scripts/install.sh
            '



